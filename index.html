  }

  .header {

    padding: 20px 24px;
    position: sticky;
    top: 0;

  }
  .header-top {
    display: flex; align-items: baseline; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
  }
  .header h1 {
    font-family: 'Special Elite', cursive;
    font-size: 1.6rem; color: var(--ink);
    letter-spacing: 1px; font-weight: normal;
  }
  .header h1 span { color: var(--ink-dim); font-size: 0.75em; }
  .stats {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.8rem; color: var(--ink-dim);
    display: flex; gap: 16px; flex-wrap: wrap;
  }
  .stats .count { color: var(--amber); font-weight: 600; }
  .controls {
    display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap;
  }
  .filter-btn {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.75rem; padding: 4px 10px;
    background: var(--paper-light); border: 1px solid var(--ink-faint);
    color: var(--ink-dim); cursor: pointer; transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--ink-dim); color: var(--ink); }
  .filter-btn.active { background: var(--ink-faint); color: var(--ink); border-color: var(--ink-dim); }
  .search-box {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.75rem; padding: 4px 10px;
    background: var(--bg); border: 1px solid var(--ink-faint);
    color: var(--ink); width: 200px; outline: none;
  }
  .search-box::placeholder { color: var(--ink-faint); }
  .search-box:focus { border-color: var(--amber-dim); }

  .content { max-width: 900px; margin: 0 auto; padding: 16px 24px 60px; }

  /* Section labels (Skill Books / Recipe Magazines) */
  .section-label {
    font-family: 'Special Elite', cursive;
    font-size: 1.1rem; color: var(--ink-dim);
    letter-spacing: 0.5px; padding: 16px 0 6px;
    border-bottom: 1px solid var(--ink-faint);
    display: flex; justify-content: space-between; align-items: baseline;
  }
  .section-label .sc {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem; color: var(--ink-faint);
  }
  .section-label .sc .done { color: var(--green-bright); }

  /* Skill sub-labels (BLACKSMITHING, CARPENTRY, etc.) */
  .skill-label {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 2px; color: var(--ink-faint);
    padding: 10px 0 4px 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    padding-right: 8px;
    user-select: none;
  }
  .skill-label:hover { color: var(--ink-dim); }
  .skill-label::after {
    content: '▾';
    font-size: 0.8rem; transition: transform 0.2s;
  }
  .skill-label.collapsed::after { transform: rotate(-90deg); }
  .skill-items.collapsed { display: none; }

  /* Items */
  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 0 5px 4px; cursor: pointer;
    user-select: none; transition: background 0.1s;
  }
  .item:hover { background: var(--paper-light); }

  .checkbox {
    width: 18px; height: 18px;
    border: 1.5px solid var(--ink-faint); background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.15s;
  }
  .item.checked .checkbox { background: var(--check); border-color: var(--check); }
  .checkbox svg { width: 12px; height: 12px; opacity: 0; transition: opacity 0.15s; }
  .item.checked .checkbox svg { opacity: 1; }

  .item-vol {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem; color: var(--ink-faint);
    min-width: 80px; flex-shrink: 0;
  }
  .item.checked .item-vol { color: var(--ink-faint); }

  .item-label {
    font-size: 0.95rem; color: var(--ink);
    transition: all 0.15s; flex: 1;
  }
  .item.checked .item-label { text-decoration: line-through; color: var(--strike); }

  .item-tag {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.6rem; padding: 1px 5px;
    border: 1px solid; flex-shrink: 0;

  .tag-book { color: var(--blue); border-color: var(--blue); }
  .tag-mag { color: var(--amber-dim); border-color: var(--amber-dim); }
  .item.checked .item-tag { opacity: 0.4; }

  .reset-btn {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.7rem; padding: 6px 16px;
    background: transparent; border: 1px solid var(--red);
    color: var(--red); cursor: pointer; transition: all 0.15s;
  }
  .reset-btn:hover { background: var(--red); color: var(--ink); }

  .item.hidden { display: none; }
  .section-label.hidden { display: none; }
  .skill-label.hidden { display: none; }
</style>

// ═══════════════════════════════════════════════════════
// STORAGE (persistent across sessions)
// ═══════════════════════════════════════════════════════

const SK = 'pz-tracker-v4';

function loadState() {
  try { return JSON.parse(localStorage.getItem(SK)) || {}; }
  catch { return {}; }
}

function saveState(s) {
  localStorage.setItem(SK, JSON.stringify(s));
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════

const chk = `<svg viewBox="0 0 12 12" fill="none" stroke="#1a1a18" stroke-width="2" stroke-linecap="round"><path d="M2 6l3 3 5-5"/></svg>`;
const roman = ['I','II','III','IV','V'];

let state = {};
let filter = 'all';
let query = '';

function mid(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }

function build() {
  const el = document.getElementById('content');
  el.innerHTML = '';

  // ── Skill Books ──
  const bkLbl = document.createElement('div');
  bkLbl.className = 'section-label';
  bkLbl.dataset.sectionType = 'book';
  bkLbl.innerHTML = `<span>Skill Books</span><span class="sc" id="bkSc"></span>`;
  el.appendChild(bkLbl);

  SKILL_BOOKS.forEach(sg => {
    const groupKey = `collapse_book_${mid(sg.skill)}`;
    const isCollapsed = !!state[groupKey];

    const lbl = document.createElement('div');
    lbl.className = 'skill-label' + (isCollapsed ? ' collapsed' : '');
    lbl.dataset.skill = sg.skill;
    lbl.dataset.sectionType = 'book';
    lbl.textContent = sg.skill;

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'skill-items' + (isCollapsed ? ' collapsed' : '');
    itemsDiv.dataset.skill = sg.skill;

    lbl.addEventListener('click', () => {
      const c = lbl.classList.toggle('collapsed');
      itemsDiv.classList.toggle('collapsed', c);
      if (c) state[groupKey] = true; else delete state[groupKey];
      saveState(state);
    });

    el.appendChild(lbl);

    sg.items.forEach(b => {
      const id = `book_${mid(sg.skill)}_${b.vol}`;
      const ck = state[id] || false;
      const it = document.createElement('div');
      it.className = `item${ck ? ' checked' : ''}`;
      it.dataset.id = id;
      it.dataset.type = 'book';
      it.dataset.skill = sg.skill;
      it.dataset.search = `${sg.skill} ${b.title} ${b.levels}`.toLowerCase();
      it.innerHTML = `
        <div class="checkbox">${chk}</div>
        <div class="item-vol">Vol. ${b.vol} (${b.levels})</div>
        <div class="item-label">${sg.skill} ${roman[b.vol-1]}: "${b.title}"</div>
        <div class="item-tag tag-book">BOOK</div>
      `;
      it.addEventListener('click', () => toggle(id, it));
      itemsDiv.appendChild(it);
    });

    el.appendChild(itemsDiv);
  });

  // ── Magazines ──
  const mgLbl = document.createElement('div');
  mgLbl.className = 'section-label';
  mgLbl.dataset.sectionType = 'mag';
  mgLbl.innerHTML = `<span>Recipe Magazines</span><span class="sc" id="mgSc"></span>`;
  el.appendChild(mgLbl);

  MAGAZINES.forEach(mg => {
    const groupKey = `collapse_mag_${mid(mg.category)}`;
    const isCollapsed = !!state[groupKey];

    const lbl = document.createElement('div');
    lbl.className = 'skill-label' + (isCollapsed ? ' collapsed' : '');
    lbl.dataset.skill = mg.category;
    lbl.dataset.sectionType = 'mag';
    lbl.textContent = mg.category;

    const itemsDiv = document.createElement('div');
    itemsDiv.className = 'skill-items' + (isCollapsed ? ' collapsed' : '');
    itemsDiv.dataset.skill = mg.category;

    lbl.addEventListener('click', () => {
      const c = lbl.classList.toggle('collapsed');
      itemsDiv.classList.toggle('collapsed', c);
      if (c) state[groupKey] = true; else delete state[groupKey];
      saveState(state);
    });

    el.appendChild(lbl);

    mg.items.forEach(m => {
      const id = `mag_${mid(m)}`;
      const ck = state[id] || false;
      const it = document.createElement('div');
      it.className = `item${ck ? ' checked' : ''}`;
      it.dataset.id = id;
      it.dataset.type = 'mag';
      it.dataset.skill = mg.category;
      it.dataset.search = `${mg.category} ${m}`.toLowerCase();
      it.innerHTML = `
        <div class="checkbox">${chk}</div>
        <div class="item-label">${m}</div>
        <div class="item-tag tag-mag">MAG</div>
      `;
      it.addEventListener('click', () => toggle(id, it));
      itemsDiv.appendChild(it);
    });

    el.appendChild(itemsDiv);
  });

  // ── Reset ──
  const ra = document.createElement('div');
  ra.className = 'reset-area';
  ra.innerHTML = `<button class="reset-btn" id="resetBtn">Reset All Progress</button>`;
  el.appendChild(ra);
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('Reset all checkmarks? This cannot be undone.')) {
      state = {};
      saveState(state);
      build();
    }
  });

  applyFilters();
  counts();
}

function toggle(id, el) {
  state[id] = !state[id];
  if (!state[id]) delete state[id];
  saveState(state);
  el.classList.toggle('checked');
  counts();
  applyFilters();
}

function counts() {
  let bt=0, bd=0, mt=0, md=0;
  document.querySelectorAll('.item').forEach(i => {
    if (i.dataset.type === 'book') { bt++; if (i.classList.contains('checked')) bd++; }
    else { mt++; if (i.classList.contains('checked')) md++; }
  });
  document.getElementById('bookCount').textContent = `${bd}/${bt}`;
  document.getElementById('magCount').textContent = `${md}/${mt}`;
  document.getElementById('totalCount').textContent = `${bd+md}/${bt+mt}`;
  const bs = document.getElementById('bkSc');
  if (bs) bs.innerHTML = `<span class="done">${bd}</span>/${bt}`;
  const ms = document.getElementById('mgSc');
  if (ms) ms.innerHTML = `<span class="done">${md}</span>/${mt}`;
}

function applyFilters() {
  document.querySelectorAll('.item').forEach(i => {
    let show = true;
    const ck = i.classList.contains('checked');
    const tp = i.dataset.type;
    const sr = i.dataset.search;
    if (filter === 'checked' && !ck) show = false;
    if (filter === 'unchecked' && ck) show = false;
    if (filter === 'book' && tp !== 'book') show = false;
    if (filter === 'mag' && tp !== 'mag') show = false;
    if (query && !sr.includes(query)) show = false;
    i.classList.toggle('hidden', !show);
  });

  // Hide section labels if empty
  document.querySelectorAll('.section-label').forEach(l => {
    const tp = l.dataset.sectionType;
    const vis = document.querySelectorAll(`.item[data-type="${tp}"]:not(.hidden)`);
    l.classList.toggle('hidden', vis.length === 0);
  });

  // Hide skill sub-labels if all their items hidden
  document.querySelectorAll('.skill-label').forEach(l => {
    const itemsDiv = l.nextElementSibling;
    if (!itemsDiv || !itemsDiv.classList.contains('skill-items')) return;
    const hasVis = [...itemsDiv.querySelectorAll('.item')].some(i => !i.classList.contains('hidden'));
    l.classList.toggle('hidden', !hasVis);
  });
}

document.querySelectorAll('.filter-btn').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    filter = b.dataset.filter;
    applyFilters();
  });
});

document.getElementById('searchBox').addEventListener('input', e => {
  query = e.target.value.toLowerCase().trim();
  applyFilters();
});

state = loadState();
build();
</script>
